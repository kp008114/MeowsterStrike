<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฅ^•ﻌ•^ฅ  貓彈群組簽到表 愛阿凱</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #eceff1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #666;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus {
            border-color: #007bff;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #0056b3;
        }
        .message {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ฅ^•ﻌ•^ฅ  貓彈群組簽到系統</h2>
    <form id="signInForm">
        <div class="form-group">
            <label for="gameId">ID(主號)</label>
            <input type="text" id="gameId" placeholder="請輸入遊戲內ID" required>
        </div>
        <div class="form-group">
            <label for="gameName">遊戲名稱(主號)</label>
            <input type="text" id="gameName" placeholder="請輸入遊戲暱稱" required>
        </div>
        <div class="form-group">
            <label for="gameLevel">等級(主號)</label>
            <input type="number" id="gameLevel" placeholder="請輸入目前等級" required>
        </div>
        <div class="form-group">
            <label for="lineName">LINE 名稱</label>
            <input type="text" id="lineName" placeholder="請輸入LINE上的暱稱" required>
        </div>
        
        <div class="form-group">
            <label>是否多帳？</label>
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="multiAcc" value="是" required> 是
                </label>
                <label class="radio-label">
                    <input type="radio" name="multiAcc" value="否" checked required> 否
                </label>
            </div>
        </div>

        <button type="submit" id="submitBtn">提交簽到</button>
    </form>
    <div class="message" id="msg"></div>
</div>

<style>
    .radio-group {
        display: flex;
        gap: 20px;
        margin-top: 8px;
    }
    .radio-label {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        font-weight: normal; /* 讓選項文字不要跟標題一樣粗 */
        color: #333;
    }
    .radio-label input {
        width: auto; /* 覆蓋原本 input 100% 的寬度 */
        margin: 0;
    }
</style>

<script>
    // ⚠️ 請記得確認這裡有放上你的 GAS URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz9KuDv8ww1suqX4sDvT567VY2mNZ19oHW_Kl9P15bi5wU5cjc4m4ucXjudeBvCJzWp9A/exec";

    document.getElementById('signInForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const msgDiv = document.getElementById('msg');
        
        submitBtn.disabled = true;
        submitBtn.innerText = "傳送中...";
        msgDiv.innerText = "";

        // 取得點選的「是否多帳」數值
        const multiAccValue = document.querySelector('input[name="multiAcc"]:checked').value;

        // 打包要傳送給後端的資料（對應你的 doPost 欄位名稱）
        const payload = {
            id: document.getElementById('gameId').value,
            gameName: document.getElementById('gameName').value,
            level: document.getElementById('gameLevel').value,
            lineName: document.getElementById('lineName').value,
            multiacc_bool: multiAccValue, // 傳送 "是" 或 "否"
            signin: "已簽到"              // 自動帶入簽到狀態
        };

        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if(data.status === 'success') {
                msgDiv.style.color = 'green';
                msgDiv.innerText = '✨ 簽到成功！資料已同步。';
                document.getElementById('signInForm').reset();
            } else if(data.status === 'duplicate') {
                msgDiv.style.color = 'orange';
                msgDiv.innerText = '⚠️ ' + data.message;
            } else {
                msgDiv.style.color = 'red';
                msgDiv.innerText = '❌ 簽到失敗，請稍後再試。';
            }
        })
        .catch(error => {
            console.error('Error:', error);
            msgDiv.style.color = 'red';
            msgDiv.innerText = '❌ 網路連線異常。';
        })
        .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerText = "提交簽到";
        });
    });
</script>

</body>
</html>
