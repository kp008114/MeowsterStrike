<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฅ^•ﻌ•^ฅ  貓彈群組點名系統</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('https://i.meee.com.tw/voUo5FA.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-color: #eceff1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.94); 
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            width: 100%;
            max-width: 450px; 
            box-sizing: border-box;
            z-index: 1; 
        }
        
        .form-header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        h2 {
            color: #333;
            margin: 0 0 8px 0;
        }
        
        .sub-title {
            margin: 4px 0;
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        button.action-btn {
            padding: 14px 40px;
            background: #ff6b81; 
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.4);
            transition: all 0.2s;
        }
        
        button.action-btn:hover {
            background: #ee5253;
            transform: translateY(-2px);
        }

        button.action-btn:disabled {
            background: #ccc;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .list-section {
            background: #fff;
            padding: 10px;
            border-radius: 12px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            max-height: 400px; 
            overflow-y: auto;
        }
        
        .name-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .name-table tr {
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
            cursor: pointer;
        }

        .name-table tr:hover {
            background: #fff5f6;
        }
        
        .name-table td {
            padding: 12px 10px;
            text-align: center;
            font-size: 16px;
        }

        .name-table td:first-child {
            width: 50px; 
        }

        .status-badge {
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 14px;
        }
        .status-yet {
            background-color: #f1f2f6;
            color: #747d8c;
        }
        .status-done {
            background-color: #d4edda;
            color: #155724;
        }

        /* 彈出視窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .modal-overlay.open {
            visibility: visible;
            opacity: 1;
        }

        .modal-box {
            background: white;
            padding: 25px;
            border-radius: 16px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-box h3 {
            margin-top: 0;
            text-align: center;
            color: #333;
        }

        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            color: #444;
            font-weight: 600;
        }
        
        input[type="password"] {
            width: 100%;
            padding: 11px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: center;
            letter-spacing: 2px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 11px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button.btn-close { background: #f1f2f6; color: #555; }
        button.btn-confirm { background: #ff6b81; color: white; }
        button.btn-confirm:hover { background: #ee5253; }

        .loading-text {
            text-align: center;
            color: #666;
            padding: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-header">
        <h2>ฅ^•ﻌ•^ฅ  貓彈群組簽到系統 <span style="color: #ff4d6d;">&hearts;</span><br>阿凱愛尤魚 🦑</h2>
        <p class="sub-title">請在下方列表選取「你的 LINE 名稱」，並點擊按鈕簽到</p>
    </div>

    <div class="btn-container">
        <button class="action-btn" id="openModalBtn" onclick="openModal()" disabled>請先選擇名稱</button>
    </div>

    <div class="list-section">
        <div id="loadingText" class="loading-text">正在載入名單中，請稍候...⏳</div>
        <table class="name-table" id="nameTable" style="display: none;">
            <tbody id="listBody">
            </tbody>
        </table>
    </div>
</div>

<!-- 驗證密碼彈出視窗 -->
<div class="modal-overlay" id="verifyModal">
    <div class="modal-box">
        <h3 id="modalTitle">驗證身分</h3>
        <form id="verifyForm">
            <!-- 1. LINE 名稱輸入框：把 type 改回 text（字才看得到），並給它獨立的 id -->
            <div class="form-group">
                <label>請輸入你的 LINE 名稱</label>
                <input type="text" id="verifyLineName" placeholder="請精準輸入你的 LINE 暱稱" required>
            </div>
            <!-- 2. 驗證碼輸入框：保持密碼隱碼狀態 -->
            <div class="form-group">
                <label>請輸入專屬簽到驗證碼</label>
                <input type="password" id="verifyCode" placeholder="請輸入 6 碼簽到驗證碼" maxlength="6" required>
            </div>
            <div class="modal-buttons">
                <button type="button" class="btn-close" onclick="closeModal()">取消</button>
                <button type="submit" class="btn-confirm" id="confirmBtn">確認簽到</button>
            </div>
        </form>
        <div id="modalMsg" style="text-align:center; margin-top:10px; font-weight:bold;"></div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz9KuDv8ww1suqX4sDvT567VY2mNZ19oHW_Kl9P15bi5wU5cjc4m4ucXjudeBvCJzWp9A/exec";
    let selectedUser = "";

    window.onload = function() {
        loadMemberList();
    };

    function loadMemberList() {
        fetch(GAS_URL)
        .then(response => response.json())
        .then(data => {
            document.getElementById('loadingText').style.display = 'none';
            document.getElementById('nameTable').style.display = 'table';
            
            const listBody = document.getElementById('listBody');
            listBody.innerHTML = "";

            data.forEach((member, index) => {
                const isDone = member.status === "已簽到";
                const badgeClass = isDone ? "status-done" : "status-yet";
                const statusText = isDone ? "已簽到 ✨" : "未簽到";
                
                const row = `
                    <tr onclick="selectUser('${member.lineName}', ${isDone}, ${index})">
                        <td>
                            <input type="radio" name="userRadio" id="radio_${index}" value="${member.lineName}" ${isDone ? 'disabled' : ''}>
                        </td>
                        <td><strong>${member.lineName}</strong></td>
                        <td><span class="status-badge ${badgeClass}" id="badge_${index}">${statusText}</span></td>
                    </tr>
                `;
                listBody.innerHTML += row;
            });
        })
        .catch(err => {
            document.getElementById('loadingText').innerText = "❌ 無法載入名單，請重新整理頁面。";
            console.error(err);
        });
    }

    function selectUser(lineName, isDone, index) {
        if (isDone) {
            alert("你已經簽到成功囉！");
            return;
        }
        document.getElementById(`radio_${index}`).checked = true;
        selectedUser = lineName;
        
        const openBtn = document.getElementById('openModalBtn');
        openBtn.disabled = false;
        openBtn.innerText = `幫【${lineName}】簽到`;
    }

    function openModal() {
        if(!selectedUser) return;
        document.getElementById('modalTitle').innerText = `🎯 驗證：${selectedUser}`;
        document.getElementById('verifyModal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('verifyModal').classList.remove('open');
        document.getElementById('verifyForm').reset();
        document.getElementById('modalMsg').innerText = "";
    }

    document.getElementById('verifyForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const confirmBtn = document.getElementById('confirmBtn');
        const modalMsg = document.getElementById('modalMsg');
        
        confirmBtn.disabled = true;
        confirmBtn.innerText = "核對中...";
        modalMsg.innerText = "";

        const payload = {
			selectedName: selectedUser, // 網頁畫面上群友勾選的名字
			lineName: document.getElementById('verifyLineName').value.trim(), // 彈出視窗手動輸入的名字
			code: document.getElementById('verifyCode').value.trim() // 彈出視窗輸入的驗證碼
		};

        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                modalMsg.style.color = 'green';
                modalMsg.innerText = '✅ 簽到成功！';
                
                setTimeout(() => {
                    closeModal();
                    document.getElementById('nameTable').style.display = 'none';
                    document.getElementById('loadingText').style.display = 'block';
                    document.getElementById('loadingText').innerText = '正在更新名單狀態...';
                    document.getElementById('openModalBtn').disabled = true;
                    document.getElementById('openModalBtn').innerText = '請先選擇名稱';
                    selectedUser = "";
                    loadMemberList();
                }, 1500);
            } else {
                modalMsg.style.color = 'red';
                modalMsg.innerText = '❌ ' + data.message;
                confirmBtn.disabled = false;
                confirmBtn.innerText = "確認簽到";
            }
        })
        .catch(err => {
            modalMsg.style.color = 'red';
            modalMsg.innerText = '❌ 網路連線錯誤。';
            confirmBtn.disabled = false;
            confirmBtn.innerText = "確認簽到";
        });
    });
</script>
</body>
</html>
