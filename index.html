<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฅ^•ﻌ•^ฅ  貓彈群組簽到表</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* --- 🌟 背景圖設定開始 🌟 --- */
            
            /* 使用你專屬的貓咪+寶珠背景圖 */
            background-image: url('https://i.meee.com.tw/voUo5FA.png');
            
            /* 讓背景圖覆蓋整個螢幕 */
            background-size: cover;
            
            /* 讓背景圖固定，不隨捲軸捲動 */
            background-attachment: fixed;
            
            /* 將背景圖置中 */
            background-position: center;
            
            /* 如果圖片沒跑出來，使用一個淡淡的底色 */
            background-color: #eceff1;
            
            /* --- 🌟 背景圖設定結束 🌟 --- */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        /* 表單容器：半透明磨砂玻璃質感 */
        .container {
            background: rgba(255, 255, 255, 0.92); 
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            z-index: 1; 
        }
        
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 24px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            color: #444;
            font-weight: 600;
        }
        
        input {
            width: 100%;
            padding: 11px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
        }
        
        input:focus {
            border-color: #ff6b81; /* 聚焦時變成可愛的粉妞色系 */
            outline: none;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #ff6b81; /* 改為與粉藍背景較搭配的貓咪粉色 */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        
        button:hover {
            background: #ee5253;
        }
        
        .message {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }
        
        /* 單選鈕排版 */
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 8px;
        }
        
        .radio-label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-weight: normal; 
            color: #333;
        }
        
        .radio-label input {
            width: auto; 
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ฅ^•ﻌ•^ฅ  貓彈群組簽到系統<br>❤阿凱愛尤魚🦑</h2>
    <form id="signInForm">
        <div class="form-group">
            <label for="gameId">ID(主號)</label>
            <input type="text" id="gameId" placeholder="請輸入遊戲內ID" required>
        </div>
        <div class="form-group">
            <label for="gameName">遊戲名稱(主號)</label>
            <input type="text" id="gameName" placeholder="請輸入遊戲暱稱" required>
        </div>
        <div class="form-group">
            <label for="gameLevel">等級(主號)</label>
            <input type="number" id="gameLevel" placeholder="請輸入目前等級" required>
        </div>
        <div class="form-group">
            <label for="lineName">LINE 名稱</label>
            <input type="text" id="lineName" placeholder="請輸入LINE上的暱稱" required>
        </div>
        
        <div class="form-group">
            <label>是否多帳？</label>
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="multiAcc" value="是" required> 是
                </label>
                <label class="radio-label">
                    <input type="radio" name="multiAcc" value="否" checked required> 否
                </label>
            </div>
        </div>

        <button type="submit" id="submitBtn">提交簽到</button>
    </form>
    <div class="message" id="msg"></div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz9KuDv8ww1suqX4sDvT567VY2mNZ19oHW_Kl9P15bi5wU5cjc4m4ucXjudeBvCJzWp9A/exec";

    document.getElementById('signInForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const msgDiv = document.getElementById('msg');
        
        submitBtn.disabled = true;
        submitBtn.innerText = "傳送中...";
        msgDiv.innerText = "";

        const multiAccValue = document.querySelector('input[name="multiAcc"]:checked').value;

        const payload = {
            id: document.getElementById('gameId').value,
            gameName: document.getElementById('gameName').value,
            level: document.getElementById('gameLevel').value,
            lineName: document.getElementById('lineName').value,
            multiacc_bool: multiAccValue, 
            signin: "已簽到"              
        };

        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if(data.status === 'success') {
                msgDiv.style.color = 'green';
                msgDiv.innerText = '✨ 簽到成功！資料已同步。';
                document.getElementById('signInForm').reset();
            } else if(data.status === 'duplicate') {
                msgDiv.style.color = 'orange';
                msgDiv.innerText = '⚠️ ' + data.message;
            } else {
                msgDiv.style.color = 'red';
                msgDiv.innerText = '❌ 簽到失敗，請稍後再試。';
            }
        })
        .catch(error => {
            console.error('Error:', error);
            msgDiv.style.color = 'red';
            msgDiv.innerText = '❌ 網路連線異常。';
        })
        .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerText = "提交簽到";
        });
    });
</script>

</body>
</html>
